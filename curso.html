<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso - Plataforma de Aprendizaje</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="curso.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Plataforma Edu</div>
        <div class="nav-links">
            <a href="dashboard.html" class="btn-back">Volver al Dashboard</a>
        </div>
    </nav>
    <main class="curso-container">
        <div class="curso-header">
            <h1 id="curso-titulo">Cargando...</h1>
            <button id="btn-completar" class="btn-completar" style="display: none;">Marcar como completado</button>
        </div>
        <p id="curso-descripcion" class="descripcion-destacada"></p>
        <div id="curso-contenido" class="contenido-area">
            <div class="loader-container">
                <div class="spinner"></div>
                <p>Cargando material...</p>
            </div>
        </div>
    </main>
    <script type="module" src="curso.js"></script>
</body>
</html>
