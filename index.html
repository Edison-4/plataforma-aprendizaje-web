<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Plataforma de Aprendizaje</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required>
                    <button type="button" id="toggle-password" class="btn-toggle-password">Ver</button>
                </div>
            </div>
            <button type="submit">Ingresar</button>
        </form>
        
        <button type="button" id="google-btn" class="btn-google">Ingresar con Google</button>
        
        <p id="message"></p>
        <div class="links">
            <a href="reset-password.html">¿Olvidaste tu contraseña?</a>
            <br><br>
            <a href="registro.html">¿No tienes cuenta? Regístrate aquí</a>
        </div>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
